      tags:
      - gpu-worker
  /health:
    get:
      description: |-
        Returns the build version, current timestamp, and the result of
        a 3-second Proxmox `/version` probe. Always 200 — the
        proxmox_ok field carries the dependency result so dashboards
        can distinguish "Nimbus is up but Proxmox is sad" from "Nimbus
        is down".
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.EnvelopeOK'
            - properties:
                data:
                  $ref: '#/definitions/handlers.healthResponse'
              type: object
      summary: Liveness + Proxmox reachability probe
      tags:
      - health
  /ips:
    get:
      description: |-
        Admin-only view of the local cache: free/reserved/allocated +
        who holds each IP. The reconciler converges this against
        Proxmox in the background; use POST /ips/reconcile to force
        a fresh diff on demand.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.EnvelopeOK'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/ippool.IPAllocation'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: List the static IP pool with per-row state
      tags:
      - ips
  /ips/reconcile:
    post:
      description: |-
        Bypasses the background loop and runs a one-shot diff. Returns
        the resulting Report (adopted / conflicts / freed / vacated).
        Even on partial failure the response is 200 — the report still
        carries the rows that were touched, with the error string
        alongside.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.EnvelopeOK'
            - properties:
                data:
                  $ref: '#/definitions/ippool.Report'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: Force an IP-pool reconcile against Proxmox (admin)
      tags:
      - ips
  /keys:
    get:
      description: |-
        Returns the caller's stored SSH keys. Public-key + metadata only;
        the encrypted private half is fetched via GET /keys/{id}/private-key.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.EnvelopeOK'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/handlers.keyView'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: List SSH keys
      tags:
      - keys
    post:
      consumes:
      - application/json
      description: |-
        Either generates a new ed25519 keypair (`generate=true`) or stores
        an imported public/private key. The freshly generated private half
        is returned only on this response — re-download via /keys/{id}/private-key later.
      parameters:
      - description: Key creation request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.createKeyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/handlers.EnvelopeOK'
            - properties:
                data:
                  $ref: '#/definitions/handlers.createKeyResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: Create or import an SSH key
      tags:
      - keys
  /keys/{id}:
    delete:
      parameters:
      - description: Key ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
