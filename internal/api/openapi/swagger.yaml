basePath: /api
definitions:
  bootstrap.Result:
    properties:
      created:
        items:
          $ref: '#/definitions/bootstrap.TemplateOutcome'
        type: array
      failed:
        items:
          $ref: '#/definitions/bootstrap.TemplateOutcome'
        type: array
      skipped:
        items:
          $ref: '#/definitions/bootstrap.TemplateOutcome'
        type: array
    type: object
  bootstrap.TemplateOutcome:
    properties:
      duration:
        type: integer
      error:
        type: string
      node:
        type: string
      os:
        type: string
      vmid:
        type: integer
    type: object
  db.Node:
    properties:
      created_at:
        type: string
      last_seen_at:
        type: string
      lock_reason:
        type: string
      lock_state:
        type: string
      locked_at:
        type: string
      locked_by:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  db.VM:
    properties:
      error_msg:
        type: string
      hostname:
        type: string
      ip:
        type: string
      key_name:
        description: |-
          KeyName is denormalized for convenient list rendering — clients still
          want "ssh -i ~/.ssh/{key_name}" without joining to ssh_keys. Set to the
          linked key's Name at provision time.
        type: string
      missed_cycles:
        description: |-
          MissedCycles counts consecutive VM-reconciler runs in which Proxmox
          reported no VM at this row's (node, vmid). Reset to 0 whenever the VM
          is observed again. Crossing VACATE_MISS_THRESHOLD soft-deletes the row.
          Default 0 — pre-existing rows behave correctly without backfill.
        type: integer
      node:
        type: string
      os_template:
        type: string
      owner_id:
        type: integer
      ssh_key_id:
        description: |-
          SSHKeyID points to the row in the ssh_keys table that owns the SSH
          material for this VM. nullable: set NULL when the key is deleted, so the
          VM record outlives its key. Replaces the legacy per-VM KeyName/CT/Nonce
          columns going forward.
        type: integer
      ssh_pubkey:
        description: Public half of the SSH key, stored as the raw "ssh-<algo> <base64>
          <comment>" line.
        type: string
      status:
        type: string
      tier:
        type: string
      tunnel_error:
        type: string
      tunnel_id:
        description: |-
          Tunnel fields (Phase 2 — Gopher integration). Empty when the user did
          not request a public tunnel; TunnelError is non-empty when registration
          or bootstrap failed but the VM itself is fine.
        type: string
      tunnel_url:
        type: string
      username:
        type: string
      vmid:
        type: integer
    type: object
  handlers.DiscoveredEndpoint:
    properties:
      ip:
        type: string
      node_name:
        type: string
      source:
        description: |-
          Source tells the SPA where this entry came from so it can group
          or label appropriately. "localhost" only appears on hypervisor
          installs; "corosync" comes from /etc/pve/corosync.conf;
          "scan" comes from the LAN TLS scan (CN extracted from the cert).
        type: string
      url:
        type: string
    type: object
  handlers.EmailUnlinkedResult:
    properties:
      failed:
        type: integer
      failures:
        items:
          type: string
        type: array
      sent:
        type: integer
    type: object
  handlers.EnvelopeError:
    properties:
      error:
        example: invalid id
        type: string
      success:
        example: false
        type: boolean
    type: object
  handlers.EnvelopeOK:
    properties:
      data: {}
      success:
        example: true
        type: boolean
    type: object
  handlers.QuotaSettingsView:
    properties:
      member_max_active_jobs:
        type: integer
      member_max_vms:
        type: integer
    type: object
  handlers.accessCodeView:
    properties:
      access_code:
        type: string
      version:
        type: integer
    type: object
  handlers.accountView:
    properties:
      email:
        type: string
      github_connected:
        type: boolean
      google_connected:
        type: boolean
      has_password:
        type: boolean
      id:
        type: integer
      is_admin:
        type: boolean
      name:
        type: string
    type: object
  handlers.attachPrivateKeyRequest:
    properties:
      private_key:
        type: string
    type: object
  handlers.authorizedDomainsView:
    properties:
      domains:
        items:
          type: string
        type: array
    type: object
  handlers.authorizedOrgsView:
    properties:
      orgs:
        items:
          type: string
        type: array
    type: object
  handlers.bootstrapRequest:
    properties:
      force:
        type: boolean
      nodes:
        items:
          type: string
        type: array
      os:
        items:
          type: string
        type: array
    type: object
  handlers.bootstrapStatusView:
    properties:
      bootstrapped:
        type: boolean
    type: object
  handlers.changeBindingRequest:
    properties:
      proxmox_host:
        type: string
      proxmox_token_id:
        type: string
      proxmox_token_secret:
        type: string
    type: object
  handlers.changeBindingResponse:
    properties:
      message:
        example: Proxmox connection updated. Reloading Nimbus…
        type: string
    type: object
  handlers.changePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        type: string
    type: object
  handlers.clusterStatsView:
    properties:
      storage_total:
        type: integer
      storage_used:
        type: integer
    type: object
  handlers.clusterVMView:
    properties:
      created_at:
        type: string
      hostname:
        description: local-only Nimbus hostname
        type: string
      id:
        description: |-
          ID is the Nimbus DB row id, set only for local-source VMs. Used by the
          admin SSH modal to call the per-VM private-key download endpoint.
        type: integer
      ip:
        type: string
      ip_source:
        description: ipconfig0 | agent
        type: string
      key_name:
        description: |-
          KeyName is the SSH key file name, set only for local-source VMs that
          were provisioned with a vault-stored key.
        type: string
      name:
        type: string
      nimbus_managed:
        description: |-
          NimbusManaged is true for both local and foreign Nimbus VMs. Retained
          for backward compatibility with frontend code that predates Source.
        type: boolean
      node:
        type: string
      os_id:
        description: |-
          OS detail block — best-effort agent osinfo, surfaced to the frontend
          so it can render an icon, version label, and a hover popover with
          kernel/arch details. Empty string when unavailable.
        type: string
      os_kernel:
        description: '"5.15.0-91-generic"'
        type: string
      os_machine:
        description: '"x86_64"'
        type: string
      os_pretty:
        description: '"Ubuntu 22.04.3 LTS"'
        type: string
      os_template:
        type: string
      os_version:
        description: '"22.04.3 LTS (Jammy Jellyfish)"'
        type: string
      os_version_id:
        description: '"22.04"'
        type: string
      source:
        allOf:
        - $ref: '#/definitions/handlers.vmSource'
        description: |-
          Source distinguishes local-Nimbus / foreign-Nimbus / external. The
          frontend uses this for the SOURCE column and to gate features that need
          local credentials (e.g. SSH copy).
      status:
        description: running, stopped, paused
        type: string
      tier:
        description: small/medium/large/xl, "custom" for external
        type: string
      tunnel_url:
        description: |-
          TunnelURL is "host:port" when the VM has an established Gopher SSH
          tunnel. Set only for local-source VMs; surfaced so the admin SSH
          modal can render the public ssh command alongside the LAN one.
        type: string
      username:
        description: local-only SSH username
        type: string
      vmid:
        type: integer
    type: object
  handlers.cordonRequest:
    properties:
      reason:
        type: string
    type: object
  handlers.createAdminRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  handlers.createBucketBody:
    properties:
      name:
        example: uploads
        type: string
    type: object
  handlers.createBucketResp:
    properties:
      name:
        example: kevin-u3-uploads
        type: string
    type: object
  handlers.createKeyRequest:
    properties:
      generate:
        type: boolean
      label:
        type: string
      name:
        type: string
      private_key:
        type: string
      public_key:
        type: string
      set_default:
        type: boolean
    type: object
  handlers.createKeyResponse:
    properties:
      created_at:
        type: string
      fingerprint:
        type: string
      has_private_key:
        type: boolean
      id:
        type: integer
      is_default:
        type: boolean
      label:
        type: string
      name:
        type: string
      owner_id:
        type: integer
      private_key:
        type: string
      public_key:
        type: string
      source:
        type: string
      system_generated:
        type: boolean
      updated_at:
        type: string
    type: object
  handlers.createTunnelRequest:
    properties:
      bot_protection_allow_ip:
        type: string
      bot_protection_enabled:
        type: boolean
      bot_protection_ttl:
        type: integer
      no_tls:
        type: boolean
      private:
        type: boolean
      subdomain:
        type: string
      target_port:
        type: integer
      tls_skip_verify:
        type: boolean
      transport:
        type: string
    type: object
  handlers.createVMRequest:
    properties:
      enable_gpu:
        type: boolean
      generate_key:
        type: boolean
      hostname:
        type: string
      os_template:
        type: string
      public_tunnel:
        type: boolean
      ssh_key_id:
        type: integer
      ssh_privkey:
        type: string
      ssh_pubkey:
        type: string
      subdomain:
        type: string
      tier:
        type: string
      tunnel_port:
        type: integer
    type: object
  handlers.credentialsView:
    properties:
      access_key:
        type: string
      endpoint:
        type: string
      prefix:
        type: string
      secret_key:
        type: string
    type: object
  handlers.deleteBucketResp:
    properties:
      message:
        example: bucket deleted
        type: string
    type: object
  handlers.deleteBucketResponse:
    properties:
      message:
        example: bucket deleted
        type: string
    type: object
  handlers.deleteStorageResponse:
    properties:
      message:
        example: s3 storage deleted
        type: string
    type: object
  handlers.deleteTunnelResponse:
    properties:
      message:
        example: tunnel deleted
        type: string
    type: object
  handlers.deleteUserRequest:
    properties:
      vm_action:
        type: string
    type: object
  handlers.deployStorageRequest:
    properties:
      disk_gb:
        type: integer
    type: object
  handlers.discoverResult:
    properties:
      endpoints:
        items:
          $ref: '#/definitions/handlers.DiscoveredEndpoint'
        type: array
      is_hypervisor:
        type: boolean
      suggested_gateway:
        type: string
    type: object
  handlers.drainExecuteRequest:
    properties:
      choices:
        items:
          properties:
            target:
              type: string
            vm_id:
              type: integer
          type: object
        type: array
      confirm_phrase:
        description: |-
          ConfirmPhrase must match "DRAIN <NODE>" exactly. The SPA enforces
          this client-side too; the server check is the authoritative gate
          in case the SPA bug-bypasses.
        type: string
    type: object
  handlers.gopherSettingsView:
    properties:
      api_url:
        type: string
      cloud_subdomain:
        description: |-
          CloudSubdomain is the *effective* leftmost label of the public URL —
          empty in the DB collapses to selftunnel.DefaultCloudSubdomain ("cloud")
          here so the UI never has to guess the fallback.
        type: string
      configured:
        type: boolean
    type: object
  handlers.gpuJobView:
    properties:
      artifact_path:
        type: string
      command:
        type: string
      env:
        additionalProperties:
          type: string
        type: object
      error_msg:
        type: string
      exit_code:
        type: integer
      finished_at:
        type: string
      id:
        type: integer
      image:
        type: string
      log_tail:
        type: string
      owner_id:
        type: integer
      queued_at:
        type: string
      started_at:
        type: string
      status:
        type: string
      vm_id:
        type: integer
      worker_id:
        type: string
    type: object
  handlers.gpuRegisterRequest:
    properties:
      hostname:
        type: string
      ip:
        type: string
      model:
        type: string
      pairing_token:
        type: string
      port:
        type: integer
    type: object
  handlers.gpuRegisterResponse:
    properties:
      base_url:
        type: string
      worker_token:
        type: string
    type: object
  handlers.gpuSettingsView:
    properties:
      base_url:
        type: string
      configured:
        type: boolean
      enabled:
        type: boolean
      gx10_hostname:
        description: self-reported at pairing time
        type: string
      inference_model:
        type: string
    type: object
  handlers.healthResponse:
    properties:
      proxmox_error:
        type: string
      proxmox_ok:
        type: boolean
      proxmox_version:
        type: string
      status:
        type: string
      timestamp:
        type: string
      version:
        type: string
    type: object
  handlers.inferenceView:
    properties:
      base_url:
        type: string
      enabled:
        type: boolean
      model:
        type: string
      status:
        description: up | down | unconfigured
        type: string
    type: object
  handlers.keyView:
    properties:
      created_at:
        type: string
      fingerprint:
        type: string
      has_private_key:
        type: boolean
      id:
        type: integer
      is_default:
        type: boolean
      label:
        type: string
      name:
        type: string
      owner_id:
        type: integer
      public_key:
        type: string
      source:
        type: string
      system_generated:
        type: boolean
      updated_at:
        type: string
    type: object
  handlers.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  handlers.networkOpFailureView:
    properties:
      error:
        type: string
      hostname:
        type: string
      vm_row_id:
        type: integer
      vmid:
        type: integer
    type: object
  handlers.networkOpResponse:
    properties:
      failures:
        items:
          $ref: '#/definitions/handlers.networkOpFailureView'
        type: array
      updated:
        type: integer
    type: object
  handlers.networkSettingsView:
    properties:
      gateway_ip:
        type: string
      ip_pool_end:
        type: string
      ip_pool_start:
        type: string
      prefix_len:
        type: integer
    type: object
  handlers.oauthSettingsView:
    properties:
      github_callback_url:
        description: |-
          GitHubCallbackURL is the matching value for GitHub's "Authorization
          callback URL" field. GitHub doesn't accept a redirect_uri query param
          the way Google does — it uses whatever is registered on the OAuth app
          — so this is purely informational for the admin.
        type: string
      github_client_id:
        type: string
      github_configured:
        type: boolean
      google_client_id:
        type: string
      google_configured:
        type: boolean
      google_redirect_uri:
        description: |-
          GoogleRedirectURI is the exact URI Nimbus will send to Google on the
          next OAuth start — must be registered byte-for-byte in Google Cloud
          Console. Empty if the resolver isn't wired (older callers).
        type: string
      redirect_uri_source:
        description: |-
          RedirectURISource explains where the host portion came from so the UI
          can show the right hint. One of: "cloud_tunnel" | "app_url" |
          "request_host" | "" (resolver missing).
        type: string
      redirect_uri_warning:
        description: |-
          RedirectURIWarning is set when the resolved host is something Google
          will reject (raw IP other than 127.0.0.1, loopback). Empty when the
          host looks acceptable.
        type: string
    type: object
  handlers.pairingView:
    properties:
      curl:
        type: string
      expires_in_seconds:
        type: integer
      token:
        type: string
    type: object
  handlers.passwordlessToggleRequest:
    properties:
      enabled:
        type: boolean
    type: object
  handlers.privateKeyResponse:
    properties:
      key_name:
        type: string
      private_key:
        type: string
    type: object
  handlers.promoteUserRequest:
    properties:
      password:
        type: string
    type: object
  handlers.registerRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  handlers.removeNodeResponse:
    properties:
      message:
        example: node removed
        type: string
    type: object
  handlers.saveAuthorizedDomainsRequest:
    properties:
      domains:
        items:
          type: string
        type: array
    type: object
  handlers.saveAuthorizedOrgsRequest:
    properties:
      orgs:
        items:
          type: string
        type: array
    type: object
  handlers.saveGPURequest:
    properties:
      base_url:
        type: string
      enabled:
        type: boolean
      inference_model:
        type: string
    type: object
  handlers.saveGopherRequest:
    properties:
      api_key:
        type: string
      api_url:
        type: string
      cloud_subdomain:
        description: |-
          CloudSubdomain is the leftmost label of the public hostname Nimbus's
          self-tunnel exposes the dashboard at. Empty preserves the existing
          stored value (same rule as APIURL/APIKey). Validated as a DNS label
          before persisting so a typo never reaches Gopher.
        type: string
    type: object
  handlers.saveNetworkRequest:
    properties:
      gateway_ip:
        type: string
      ip_pool_end:
        type: string
      ip_pool_start:
        type: string
      prefix_len:
        type: integer
    type: object
  handlers.saveOAuthRequest:
    properties:
      github_client_id:
        type: string
      github_client_secret:
        type: string
      google_client_id:
        type: string
      google_client_secret:
        type: string
    type: object
  handlers.selfBootstrapStatusView:
    properties:
      error:
        type: string
      state:
        type: string
      tunnel_url:
        type: string
    type: object
  handlers.setTagsRequest:
    properties:
      tags:
        items:
          type: string
        type: array
    type: object
  handlers.setupStatusView:
    properties:
      configured:
        type: boolean
      needs_admin_setup:
        type: boolean
    type: object
  handlers.storageView:
    properties:
      disk_gb:
        type: integer
      endpoint:
        type: string
      error_msg:
        type: string
      node:
        type: string
      root_password:
        type: string
      root_user:
        type: string
      status:
        type: string
      vmid:
        type: integer
    type: object
  handlers.submitJobRequest:
    properties:
      command:
        type: string
      env:
        additionalProperties:
          type: string
        type: object
      image:
        type: string
      vm_id:
        type: integer
    type: object
  handlers.suspendRequest:
    properties:
      suspended:
        type: boolean
    type: object
  handlers.tunnelInfoView:
    properties:
      enabled:
        type: boolean
      host:
        type: string
    type: object
  handlers.unpairView:
    properties:
      cancelled_jobs:
        type: integer
      cleanup_cmd:
        type: string
    type: object
  handlers.userBucketView:
    properties:
      created_at:
        type: string
      name:
        type: string
      object_count:
        type: integer
      total_size_bytes:
        type: integer
    type: object
  handlers.userQuotaRequest:
    type: object
  handlers.verifyAccessCodeRequest:
    properties:
      code:
        type: string
    type: object
  handlers.vmSource:
    enum:
    - local
    - foreign
    - external
    type: string
    x-enum-varnames:
    - sourceLocal
    - sourceForeign
    - sourceExternal
  handlers.workerStatusRequest:
    properties:
      artifact_path:
        type: string
      error_msg:
        type: string
      exit_code:
        type: integer
      status:
        type: string
    type: object
  ippool.AdoptedRow:
    properties:
      hostname:
        type: string
      ip:
        type: string
      prior_status:
        type: string
      vmid:
        type: integer
    type: object
  ippool.ConflictRow:
    properties:
      ip:
        type: string
      local_vmid:
        type: integer
      node:
        type: string
      proxmox_vmid:
        type: integer
    type: object
  ippool.IPAllocation:
    properties:
      allocated_at:
        type: string
      hostname:
        type: string
      ip:
        type: string
      last_seen_at:
        type: string
      missed_cycles:
        type: integer
      reserved_at:
        type: string
      source:
        type: string
      status:
        type: string
      vmid:
        type: integer
    type: object
  ippool.Report:
    properties:
      adopted:
        items:
          $ref: '#/definitions/ippool.AdoptedRow'
        type: array
      conflicts:
        items:
          $ref: '#/definitions/ippool.ConflictRow'
        type: array
      freed:
        items:
          type: string
        type: array
      no_ops:
        type: integer
      snapshot_at:
        type: string
      vacated:
        items:
          type: string
        type: array
    type: object
  nodemgr.Binding:
    properties:
      cluster_name:
        description: empty for single-node deployments
        type: string
      connected_node:
        description: |-
          ConnectedNode is the cluster member whose Proxmox API actually
          served this request (the node where corosync `Local=1`). For
          single-host deployments it equals the only node; for multi-node
          clusters it's the entry-point node — telling the operator "you
          reach the cluster *through* this host." Distinct from
          ClusterName, which is the corosync-wide identifier.
        type: string
      host:
        description: configured Proxmox base URL
        type: string
      last_seen:
        description: wall time of the last successful call
        type: string
      node_count:
        type: integer
      reachable:
        description: false when ALL the calls failed
        type: boolean
      token_id:
        description: |-
          TokenID is the user@realm!tokenname half of the Proxmox token
          (the secret stays write-only). Returned so the change-binding
          modal can pre-fill rather than asking the operator to retype it.
          Not actually a secret — anyone with read access to the env file
          can read it; surfacing here just saves a copy-paste step.
        type: string
      version:
        description: e.g. "8.2.7"
        type: string
    type: object
  nodemgr.DrainPlan:
    properties:
      aggregate:
        items:
          $ref: '#/definitions/nodemgr.NodeProjection'
        type: array
      has_blocked:
        description: |-
          HasBlocked is a derived flag the SPA gates the "Start drain" button
          on. True iff any row has Eligible == [] or Override pointing at a
          disabled target (the executor would refuse).
        type: boolean
      migrations:
        items:
          $ref: '#/definitions/nodemgr.PlannedMigration'
        type: array
      source_node:
        type: string
    type: object
  nodemgr.DrainWarning:
    properties:
      message:
        type: string
      severity:
        description: '"soft"/"caution"/"high"/"blocked"'
        type: string
    type: object
  nodemgr.EligibleTarget:
    properties:
      disabled:
        type: boolean
      disabled_reason:
        type: string
      node:
        type: string
      projected_ram_pct:
        type: number
      score:
        type: number
    type: object
  nodemgr.NodeProjection:
    properties:
      current_ram_pct:
        type: number
      current_vm_count:
        type: integer
      node:
        type: string
      planned_ram_pct:
        type: number
      planned_vm_count:
        type: integer
      severity:
        description: '"ok"/"caution"/"high"'
        type: string
    type: object
  nodemgr.PlannedMigration:
    properties:
      auto_pick:
        type: string
      eligible:
        items:
          $ref: '#/definitions/nodemgr.EligibleTarget'
        type: array
      hostname:
        type: string
      override:
        type: string
      tier:
        type: string
      vm_id:
        type: integer
      vm_row_id:
        type: integer
      warnings:
        items:
          $ref: '#/definitions/nodemgr.DrainWarning'
        type: array
    type: object
  nodemgr.View:
    properties:
      cpu:
        type: number
      disk_allocated:
        type: integer
      disk_pool_name:
        type: string
      disk_total:
        type: integer
      disk_used:
        description: |-
          DiskUsed/DiskTotal are the configured VM-disk pool's capacity
          on this node (from /cluster/resources?type=storage filtered by
          cfg.VMDiskStorage). DiskAllocated is the sum of every non-
          template VM's configured maxdisk on this node — the pessimistic
          "what would fill if every VM grew to its declared size" number.
          All three zero when no pool name is configured (cfg.VMDiskStorage
          empty) or when this node doesn't expose the pool.
        type: integer
      ip:
        type: string
      is_self_host:
        description: true for the node Nimbus runs on
        type: boolean
      last_seen_at:
        type: string
      lock_reason:
        type: string
      lock_state:
        description: '"none"/"cordoned"/"draining"/"drained"'
        type: string
      locked_at:
        type: string
      locked_by:
        type: integer
      max_cpu:
        type: integer
      mem_allocated:
        type: integer
      mem_total:
        type: integer
      mem_used:
        type: integer
      name:
        type: string
      status:
        description: '"online" / "offline" / "unknown" — from Proxmox'
        type: string
      swap_total:
        type: integer
      swap_used:
        description: |-
          SwapUsed/SwapTotal come from /nodes/{node}/status (fan-out per
          online node). Both 0 when the per-node call fails — single dead
          node never blanks the table.
        type: integer
      tags:
        items:
          type: string
        type: array
      vm_count:
        description: running, non-template
        type: integer
      vm_count_total:
        description: all non-template
        type: integer
    type: object
  provision.VMDeleted:
    properties:
      hostname:
        type: string
      node:
        type: string
      vm_row_id:
        type: integer
      vmid:
        type: integer
    type: object
  provision.VMMigration:
    properties:
      from_node:
        type: string
      hostname:
        type: string
      to_node:
        type: string
      vm_row_id:
        type: integer
      vmid:
        type: integer
    type: object
  provision.VMMiss:
    properties:
      hostname:
        type: string
      missed_cycles:
        type: integer
      node:
        type: string
      vm_row_id:
        type: integer
      vmid:
        type: integer
    type: object
  provision.VMSyncReport:
    properties:
      deleted:
        items:
          $ref: '#/definitions/provision.VMDeleted'
        type: array
      migrated:
        items:
          $ref: '#/definitions/provision.VMMigration'
        type: array
      missed:
        items:
          $ref: '#/definitions/provision.VMMiss'
        type: array
      no_ops:
        type: integer
      snapshot_at:
        type: string
    type: object
  s3storage.AdminBucketStat:
    properties:
      created_at:
        type: string
      name:
        type: string
      object_count:
        type: integer
      owner_email:
        type: string
      owner_id:
        type: integer
      owner_name:
        type: string
      total_size_bytes:
        type: integer
    type: object
  service.SMTPSettingsView:
    properties:
      configured:
        type: boolean
      enabled:
        type: boolean
      encryption:
        type: string
      from_address:
        type: string
      has_password:
        type: boolean
      host:
        type: string
      port:
        type: integer
      username:
        type: string
    type: object
  service.SaveSMTPRequest:
    properties:
      enabled:
        type: boolean
      encryption:
        type: string
      from_address:
        type: string
      host:
        type: string
      password:
        type: string
      port:
        type: integer
      username:
        type: string
    type: object
  service.UserView:
    properties:
      email:
        type: string
      id:
        type: integer
      is_admin:
        type: boolean
      name:
        type: string
    type: object
  tunnel.Machine:
    properties:
      bootstrap_url:
        type: string
      created_at:
        type: string
      id:
        type: string
      public_ssh:
        type: boolean
      public_ssh_host:
        type: string
      public_ssh_port:
        type: integer
      status:
        type: string
    type: object
  tunnel.Tunnel:
    properties:
      bot_protection_allow_ip:
        type: string
      bot_protection_enabled:
        description: |-
          Alpha features — bot protection (PoW JS challenge) requires a
          subdomain + TCP. Gopher silently coerces these server-side, so the
          response reflects the actual stored state, not just what we asked for.
        type: boolean
      bot_protection_ttl:
        type: integer
      created_at:
        type: string
      error:
        type: string
      id:
        type: string
      machine_id:
        type: string
      no_tls:
        description: NoTLS asks Caddy to serve http:// rather than https://.
        type: boolean
      private:
        description: Private flips the gateway-side bind to 127.0.0.1 (VPS-local).
        type: boolean
      server_port:
        description: |-
          ServerPort is the port Gopher allocated on the gateway; needed for
          UDP/port-only tunnels where there's no friendly subdomain URL.
        type: integer
      status:
        type: string
      subdomain:
        type: string
      target_ip:
        type: string
      target_port:
        type: integer
      tls_skip_verify:
        type: boolean
      transport:
        description: |-
          Transport is "tcp" (default) or "udp". UDP tunnels skip Caddy and the
          subdomain — they're reached at <gateway>:<server_port>.
        type: string
      tunnel_url:
        type: string
    type: object
info:
  contact: {}
  description: |-
    Self-hosted VM provisioning portal for Proxmox VE. The API is
    wrapped in a uniform `{success, data, error}` envelope on every
    response — see EnvelopeOK / EnvelopeError schemas below.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Nimbus HTTP API
  version: "1.0"
paths:
  /access-code/status:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.EnvelopeOK'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: Whether the user has verified the current access code
      tags:
      - auth
  /access-code/verify:
    post:
      consumes:
      - application/json
      parameters:
      - description: Access code
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.verifyAccessCodeRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.EnvelopeOK'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: Verify the current access code
      tags:
      - auth
  /account:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.EnvelopeOK'
            - properties:
                data:
                  $ref: '#/definitions/handlers.accountView'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: Current user's profile + linked-provider state
      tags:
      - auth
  /account/password:
    put:
      consumes:
      - application/json
      description: |-
        Requires the current password — a stolen session alone
        shouldn't let an attacker lock the real owner out.
      parameters:
      - description: Current + new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.changePasswordRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.EnvelopeOK'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: Rotate the current user's password
      tags:
      - auth
  /admin/bootstrap-status:
    get:
      description: |-
        Read-only yes/no — both admins and members need it so the
        Provision UI can decide whether to render the form (templates
        ready) or the "admin access required" card.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.EnvelopeOK'
            - properties:
                data:
                  $ref: '#/definitions/handlers.bootstrapStatusView'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: Whether at least one VM template exists
      tags:
      - bootstrap
  /admin/bootstrap-templates:
    post:
      consumes:
      - application/json
      description: |-
        Long-running (up to ~20 min) — downloads cloud images, clones,
        and converts to templates. Empty body uses defaults (all
        catalogue OSes on all online nodes). The 30-minute route
        timeout in the router accommodates the slowest path.
      parameters:
      - description: Optional override of node/OS scope and force-rebuild flag
        in: body
        name: body
        schema:
          $ref: '#/definitions/handlers.bootstrapRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.EnvelopeOK'
            - properties:
                data:
                  $ref: '#/definitions/bootstrap.Result'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: Build VM templates on cluster nodes (admin)
      tags:
      - bootstrap
  /auth/github:
    get:
      description: |-
        Sets short-lived state + intent cookies, then redirects to
        GitHub's authorization URL.
      responses:
        "307":
          description: Redirect to GitHub OAuth consent
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      summary: Start the GitHub OAuth sign-in flow (public)
      tags:
      - auth
  /auth/github/callback:
    get:
      description: |-
        Validates the state cookie, exchanges the code, and either
        signs the user in or links the GitHub account to the
        existing session (per the intent cookie). Always responds
        with a redirect — to the SPA on success, or back to /login
        with an explanatory query param on failure.
      parameters:
      - description: Authorization code
        in: query
        name: code
        required: true
        type: string
      - description: CSRF state echoed by GitHub
        in: query
        name: state
        required: true
        type: string
      responses:
        "307":
          description: Redirect
      summary: GitHub OAuth callback (public)
      tags:
      - auth
  /auth/github/link:
    get:
      description: |-
        Same callback as sign-in mode but the intent cookie tells
        the callback to attach to the current session rather than
        mint a new one.
      responses:
        "307":
          description: Redirect to GitHub OAuth consent
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      summary: Start the GitHub OAuth flow in link mode
      tags:
      - auth
  /auth/google:
    get:
      responses:
        "307":
          description: Redirect to Google OAuth consent
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      summary: Start the Google OAuth sign-in flow (public)
      tags:
      - auth
  /auth/google/callback:
    get:
      description: See the GitHub callback for the shared sign-in/link semantics.
      parameters:
      - description: Authorization code
        in: query
        name: code
        required: true
        type: string
      - description: CSRF state echoed by Google
        in: query
        name: state
        required: true
        type: string
      responses:
        "307":
          description: Redirect
      summary: Google OAuth callback (public)
      tags:
      - auth
  /auth/google/link:
    get:
      responses:
        "307":
          description: Redirect to Google OAuth consent
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      summary: Start the Google OAuth flow in link mode
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: |-
        Sets the session cookie inline on success. 403 with
        message "Account suspended" when the user row is suspended.
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.EnvelopeOK'
            - properties:
                data:
                  $ref: '#/definitions/service.UserView'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      summary: Email/password sign-in (public)
      tags:
      - auth
  /auth/logout:
    post:
      description: |-
        Always returns 204 — no body — even when the cookie is
        missing or invalid.
      responses:
        "204":
          description: No Content
      summary: End the current session
      tags:
      - auth
  /auth/magic/{token}:
    get:
      description: |-
        Always returns 307 — to /account?from=magic on success or to
        /login?magic=<reason> when the token is invalid/expired/used.
      parameters:
      - description: Magic-link token
        in: path
        name: token
        required: true
        type: string
      responses:
        "307":
          description: Redirect
      summary: Magic-link sign-in (public, single-use)
      tags:
      - auth
  /auth/providers:
    get:
      description: Drives which sign-in buttons render on /login.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.EnvelopeOK'
      summary: Available authentication providers (public)
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: |-
        Open-self-signup is gated by RequirePasswordlessAuth in
        production deployments — this endpoint always responds, but
        new accounts may be unable to sign in until they link OAuth.
      parameters:
      - description: New account
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/handlers.EnvelopeOK'
            - properties:
                data:
                  $ref: '#/definitions/service.UserView'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      summary: Register a new user account (public)
      tags:
      - auth
  /buckets:
    get:
      description: |-
        Bucket name, creation time, object count, and total size for
        each bucket owned by the caller. Returns 503 with a stable
        substring ("no s3 storage deployed" / "not ready") when the
        shared storage host hasn't been deployed by an admin yet —
        the SPA distinguishes these from real errors and renders an
        empty-state card.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.EnvelopeOK'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/handlers.userBucketView'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: List the calling user's MinIO buckets
      tags:
      - buckets
    post:
      consumes:
      - application/json
      description: |-
        The user supplies only the suffix half of the bucket name
        (3-30 chars, lowercase alnum + hyphen, no leading/trailing
        hyphen). Server composes the full name as
        `<owner-prefix>-<suffix>` so cross-user collisions are
        impossible. Service account is auto-minted on first call
        if the user doesn't already have one.
      parameters:
      - description: Bucket suffix
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.createBucketBody'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/handlers.EnvelopeOK'
            - properties:
                data:
                  $ref: '#/definitions/handlers.createBucketResp'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: Create a bucket owned by the calling user
      tags:
      - buckets
  /buckets/{name}:
    delete:
      description: |-
        404 if the bucket isn't owned by the caller (existence is not
        disclosed across ownership boundaries). 409 if the bucket is
        not empty — the user must empty it first; Nimbus does not
        force-delete object data.
      parameters:
      - description: Bucket name (full composed form)
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.EnvelopeOK'
            - properties:
                data:
                  $ref: '#/definitions/handlers.deleteBucketResp'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: Delete a bucket owned by the calling user
      tags:
      - buckets
  /buckets/credentials:
    get:
      description: |-
        Endpoint + access key + secret key + bucket name prefix the
        user's policy allows. The secret is returned every time;
        treat it as the primary share surface, not a one-time view.
        Auto-mints the service account on first call if needed.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.EnvelopeOK'
            - properties:
                data:
                  $ref: '#/definitions/handlers.credentialsView'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: Read the calling user's MinIO service-account credentials
      tags:
      - buckets
  /cluster/stats:
    get:
      description: |-
        Currently just storage totals (used + total bytes). Shared
        storage pools are deduped across nodes so the totals reflect
        the actual cluster footprint, not the sum of per-node views.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.EnvelopeOK'
            - properties:
                data:
                  $ref: '#/definitions/handlers.clusterStatsView'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: Aggregate cluster-level stats (admin)
      tags:
      - cluster
  /cluster/vms:
    get:
      description: |-
        Joined view: Proxmox cluster walk + Nimbus DB rows. The Source
        field distinguishes local-Nimbus / foreign-Nimbus / external
        VMs so the SPA can gate features (e.g. SSH copy needs local
        credentials, available only for source="local").
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.EnvelopeOK'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/handlers.clusterVMView'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
