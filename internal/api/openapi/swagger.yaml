        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "404":
