          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - workerAuth: []
      summary: 'Worker: append a log chunk to a running job (worker token)'
      tags:
      - gpu-worker
  /gpu/worker/jobs/{id}/status:
    post:
      consumes:
      - application/json
