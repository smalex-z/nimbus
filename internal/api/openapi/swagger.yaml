            - properties:
                data:
                  $ref: '#/definitions/handlers.inferenceView'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: Inference plane status + base URL
      tags:
      - gpu
  /gpu/install.sh:
    get:
      description: |-
        Validates ?token= against the active pairing window. The
        script body posts to /api/gpu/register and runs the
        install-inference / install-worker scripts.
      parameters:
      - description: Pairing token
        in: query
        name: token
        required: true
        type: string
      responses:
        "200":
