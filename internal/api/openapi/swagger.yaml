      tags:
      - cluster
  /cluster/vms/{id}:
    delete:
      description: |-
        Foreign / external VMs have no DB row and 404 here; route them
        through POST /cluster/vms/{node}/{vmid}/{op} with op="stop"
        and remove from Proxmox directly instead.
      parameters:
      - description: Nimbus VM DB id
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: Destroy a local-source VM by DB id (admin)
      tags:
      - cluster
  /cluster/vms/{node}/{vmid}/{op}:
    post:
      description: |-
        Routes by (node, vmid) so foreign + external VMs are reachable
        without a Nimbus DB row. Reboot waits on a Proxmox task — the
        handler timeout is 2 minutes.
      parameters:
      - description: Proxmox node name
        in: path
        name: node
        required: true
        type: string
      - description: Proxmox VMID
        in: path
        name: vmid
        required: true
        type: integer
      - description: Lifecycle op
        enum:
        - start
        - shutdown
        - stop
        - reboot
        in: path
        name: op
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: Run a power op on any cluster VM (admin)
      tags:
      - cluster
  /gpu/inference:
    get:
      description: |-
        The 2-second probe never blocks the page. Status: up | down |
        unconfigured. The base_url is what the SPA wires into the
        "OPENAI_BASE_URL" hint copy on the playground.
      produces:
      - application/json
      responses:
        "200":
          description: OK
