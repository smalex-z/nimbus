  /nodes:
    get:
      description: |-
        Joins Proxmox live telemetry (cpu/mem/storage) with the
        Nimbus-side lock state (none/cordoned/draining/drained) and
        operator-set tags. Powers both the Admin dashboard and the
        /nodes page.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.EnvelopeOK'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/nodemgr.View'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: List cluster nodes with lock state + telemetry (admin)
      tags:
      - nodes
  /nodes/{name}:
    delete:
      description: |-
        Refused unless the node is in state="drained" and isn't the
        host Nimbus itself runs on (self-host removal would lock the
        operator out of the admin UI).
      parameters:
      - description: Proxmox node name
        in: path
        name: name
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.EnvelopeOK'
            - properties:
                data:
                  $ref: '#/definitions/handlers.removeNodeResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.EnvelopeError'
      security:
      - cookieAuth: []
      summary: Remove a drained node from the cluster (admin)
      tags:
      - nodes
  /nodes/{name}/cordon:
    post:
      consumes:
      - application/json
      description: |-
        Marks the node as ineligible for new VM placement. Refused
        while a drain is in-flight on this node.
      parameters:
      - description: Proxmox node name
        in: path
        name: name
        required: true
        type: string
      - description: Optional reason for the cordon
        in: body
