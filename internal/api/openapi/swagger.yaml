        The phrase "DRAIN <NODE>" must match exactly to confirm
        (the SPA enforces this client-side too). Total wall time can
        run tens of minutes per VM on cold migrations; the route
        timeout is 60 minutes.
      parameters:
      - description: Proxmox node name
        in: path
        name: name
        required: true
        type: string
      - description: Operator-confirmed plan + DRAIN <NODE> phrase
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.drainExecuteRequest'
